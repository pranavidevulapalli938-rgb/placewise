services:
  - type: web
    name: placewise-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: DATABASE_URL
        fromDatabase:
          name: placewise-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://YOUR-FRONTEND.vercel.app   # ← update after deploying frontend
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false   # set manually
      - key: SMTP_PASS
        sync: false   # set manually (App Password)
      - key: SMTP_FROM
        sync: false   # set manually
      - key: GOOGLE_CLIENT_ID
        sync: false   # set manually
      - key: GOOGLE_CLIENT_SECRET
        sync: false   # set manually
      - key: GOOGLE_REDIRECT_URI
        value: https://YOUR-BACKEND.onrender.com/gmail/callback  # ← update after deploying

databases:
  - name: placewise-db
    databaseName: placement
    user: postgres